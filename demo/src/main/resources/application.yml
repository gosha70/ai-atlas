server:
  port: 8080

spring:
  application:
    name: ai-atlas-demo
  ai:
    mcp:
      server:
        name: ai-atlas-demo
        version: 0.1.0

ai:
  atlas:
    mcp:
      enabled: true
    audit:
      enabled: true
    api:
      major: 2
      deprecation-headers-enabled: true
      deprecation-doc-url: https://docs.example.com/api/deprecations
      version-negotiation:
        enabled: true

logging:
  level:
    ai.atlas: DEBUG
