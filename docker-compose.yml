services:
  demo:
    build:
      context: .
      dockerfile: demo/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=default
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--post-data", "id=1", "http://localhost:8080/api/v1/order-service/find-by-id"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
